version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: astraflow
      POSTGRES_USER: astra_admin
      POSTGRES_PASSWORD: astra_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - DATABASE_URL=postgresql://astra_admin:astra_password@db:5432/astraflow
      - USE_MOCK_DB=false
      - ASTRAFLOW_MASTER_KEY=${ASTRAFLOW_MASTER_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
